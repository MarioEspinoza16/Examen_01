<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenadores - Pokédex</title>

    <link rel="stylesheet" href="styles/formatos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <!-- Título + Botón Agregar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-center flex-grow-1">ENTRENADORES</h1>
            <a href="agregar-entrenador.html" class="btn btn-success">
                + Agregar Entrenador
            </a>
        </div>

        <!-- Lista de entrenadores -->
        <div id="entrenadorList" class="row g-3"></div>

    </div>

    <!-- Modal de Detalle -->
    <div class="modal fade" id="entrenadorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="entrenadorTitle"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="entrenadorImage" class="img-fluid mb-3 rounded" style="max-height: 280px;" alt="Entrenador">
                    <p id="entrenadorInfo" class="text-start"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="codes/codigo_04.js"></script>

</body>
</html>
