<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h1 class="text-center mb-4" style="color: #dc3545;">ENTRENADORES</h1>

<div class="text-center mb-4">
    <a href="index2.html" class="btn btn-outline-primary">🔙 Pokédex</a>
    <a href="equipos.html" class="btn btn-outline-info">⚔️ Equipos</a>
    <a href="agregarEntrenador.html" class="btn btn-success">➕ Agregar Entrenador</a>
    <button onclick="limpiarAgregados()" class="btn btn-warning">🧹 Limpiar Agregados</button>
</div>

        <div id="listaEntrenadores" class="row g-3"></div>
    </div>

    <script>
        // === Inicialización segura ===
        let lista = JSON.parse(localStorage.getItem("entrenadores")) || [];

        // Asegurar que los 3 famosos siempre estén
        const famosos = [
            { nombre: "Cristiano Ronaldo", edad: 39, region: "Portugal" },
            { nombre: "Lionel Messi", edad: 37, region: "Argentina" },
            { nombre: "Neymar Jr", edad: 32, region: "Brasil" }
        ];

        famosos.forEach(famoso => {
            if (!lista.some(e => e.nombre === famoso.nombre)) {
                lista.unshift(famoso); // Agregar al inicio
            }
        });

        localStorage.setItem("entrenadores", JSON.stringify(lista));

        // Mostrar todos
        const contenedor = document.getElementById("listaEntrenadores");
        contenedor.innerHTML = "";

        lista.forEach(ent => {
            const div = document.createElement("div");
            div.className = "col-lg-3 col-md-4 col-6";
            div.innerHTML = `
                <div class="card h-100">
                    <div class="card-body text-center" style="background-color: #ffe066;">
                        <h5 class="card-title">${ent.nombre}</h5>
                        <p class="mb-1">Edad: ${ent.edad}</p>
                        <p class="mb-0">Región: ${ent.region}</p>
                    </div>
                </div>
            `;
            contenedor.appendChild(div);
        });

        function limpiarAgregados() {
    if (confirm("¿Eliminar solo los entrenadores agregados? Los 3 famosos se mantendrán.")) {
        let lista = JSON.parse(localStorage.getItem("entrenadores")) || [];
        
        // Mantener solo los 3 famosos
        const famosos = ["Cristiano Ronaldo", "Lionel Messi", "Neymar Jr"];
        
        lista = lista.filter(ent => famosos.includes(ent.nombre));
        
        localStorage.setItem("entrenadores", JSON.stringify(lista));
        location.reload(); // Recargar página
    }
}
    </script>
</body>
</html>
