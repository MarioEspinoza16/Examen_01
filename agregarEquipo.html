<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 500px;">
            <div class="card-header bg-danger text-white text-center">
                <h3>➕ Agregar Nuevo Equipo</h3>
            </div>
            <div class="card-body">
                <form id="formEquipo">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Equipo</label>
                        <input type="text" class="form-control" id="nombreEquipo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL de Imagen del Equipo</label>
                        <input type="url" class="form-control" id="imagenEquipo" required placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Entrenador a Cargo</label>
                        <input type="text" class="form-control" id="entrenadorEquipo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Pokémon (separados por coma)</label>
                        <input type="text" class="form-control" id="pokemonesEquipo" placeholder="Pikachu, Charizard, Bulbasaur" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Guardar Equipo</button>
                        <a href="equipos.html" class="btn btn-secondary">Volver a Equipos</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function addEquipo(equipo) {
            let equipos = JSON.parse(localStorage.getItem("equipos")) || [];
            equipos.push(equipo);
            localStorage.setItem("equipos", JSON.stringify(equipos));
        }

        document.getElementById("formEquipo").addEventListener("submit", function(e) {
            e.preventDefault();

            const equipo = {
                nombre: document.getElementById("nombreEquipo").value,
                imagen: document.getElementById("imagenEquipo").value,
                entrenador: document.getElementById("entrenadorEquipo").value,
                pokemones: document.getElementById("pokemonesEquipo").value.split(",").map(p => p.trim())
            };

            addEquipo(equipo);
            alert("✅ Equipo guardado correctamente!");
            this.reset();
        });
    </script>
</body>
</html>
